# Configuration file for Frame-to-Frame Loop Closure (mola::FrameToFrameLoopClosure)

params:
  # ===== GNSS Optimization Parameters =====
  use_gnss: "${USE_GNSS|true}"
  gnss_minimum_uncertainty_xyz: 0.10 # [m] Minimum GPS uncertainty
  gnss_add_horizontality: false # Add constraints for flat terrain
  gnss_horizontality_sigma_z: 0.10 # [m] Z-axis constraint if enabled
  gnss_edges_uncertainty_multiplier: "${GNSS_EDGES_UNCERTAINTY_MULTIPLIER|1.0}"

  # ===== Loop Closure Candidate Selection =====
  min_distance_between_frames: "${MIN_LC_DISTANCE|2.0}" # [m] Min spatial separation
  max_distance_for_lc_candidate: "${MAX_LC_DISTANCE|50.0}" # [m] Max distance to consider
  max_lc_candidates: "${MAX_LC_CANDIDATES|20}" # Maximum candidates per iteration
  min_frames_between_lc: "${MIN_FRAMES_BETWEEN_LC|20}" # Minimum frame index separation
  max_lc_optimization_rounds: "${MAX_LC_OPTIMIZATION_ROUNDS|5}" # Maximum LC+optimization rounds to run
  lc_optimize_every_n: "${LC_OPTIMIZE_EVERY_N|5}" # Re-optimize after N accepted LCs (0=disable, closes inner loops first)

  lc_candidate_strategy: "${LC_SELECTION_METHOD|DISTANCE_STRATIFIED}" # or PROXIMITY_ONLY, MULTI_OBJECTIVE
  lc_verbose_candidate_selection: "${LC_SELECTION_VERBOSE|0}"

  # For DISTANCE_STRATIFIED:
  lc_distance_bins: 5 # Number of bins to divide the valid distance range

  # For MULTI_OBJECTIVE:
  lc_weight_proximity: 0.40 # Favor spatially close candidates
  lc_weight_frame_separation: 0.25 # Favor temporally distant candidates
  lc_weight_diversity: 0.20 # Penalize similar distances
  lc_weight_coverage: 0.15 # Favor distributed trajectory coverage

  # ===== ICP Parameters =====
  min_icp_goodness: "${MIN_ICP_QUALITY|0.65}" # [0-1] Minimum ICP quality to accept
  icp_edge_robust_param: "${ICP_ROBUST_PARAM|5.0}" # Robust kernel parameter
  icp_edge_additional_noise_xyz: 0.02 # [m] Additional edge uncertainty
  icp_edge_additional_noise_ang: 0.1 # [deg] Additional angular uncertainty
  threshold_sigma_initial: "${LC_ICP_INITIAL_SIGMA|1.0}"
  threshold_sigma_final: "${LC_ICP_FINAL_SIGMA|0.05}"

  # ===== Odometry Edge Parameters =====
  input_odometry_noise_xyz: "${INPUT_ODOMETRY_NOISE_XYZ_PER_M|0.04}" # [m] Odometry translational noise (per meter of travel if scaled)
  input_odometry_noise_ang: "${INPUT_ODOMETRY_NOISE_ANG_DEG_PER_M|0.05}" # [deg] Odometry angular noise (per meter of travel if scaled)
  scale_odometry_noise_by_distance: true # Scale noise proportionally to inter-frame distance

  # ===== Optimization Control =====
  largest_delta_for_reconsider: "${RECONSIDER_THRESHOLD|5.0}" # [m] Re-check all if change > this

  # ===== Output and Profiling =====
  profiler_enabled: true
  save_trajectory_files: true
  save_trajectory_files_with_cov: true
  debug_files_prefix: "f2f_lc_"

  # ===== 3D Scene Visualization Output =====
  save_3d_scene_files: "${SAVE_3D_SCENES|false}"
  save_3d_scene_files_per_iteration: "${SAVE_3D_SCENES_PER_ITER|false}"
  scene_path_line_width: 2.0
  scene_lc_line_width: 4.0
  scene_path_color_r: 0.0 # blue path
  scene_path_color_g: 0.0
  scene_path_color_b: 1.0
  scene_path_color_a: 0.7
  scene_lc_color_r: 1.0 # red LC edges
  scene_lc_color_g: 0.0
  scene_lc_color_b: 0.0
  scene_lc_color_a: 0.8
  scene_keyframe_point_size: 7.0

# ===== ICP Settings =====
# (Your existing ICP pipeline configuration goes here)
# The observations_generator and observations_filter sections will process
# individual frames to create point clouds for ICP matching.

icp_settings:
  # mp2p_icp ICP pipeline configuration file, for use in ICP
  # odometry and SLAM packages.
  #
  # YAML configuration file for use with the CLI tool mp2p-icp-run or
  # programmatically from function mp2p_icp::icp_pipeline_from_yaml()
  #
  class_name: mp2p_icp::ICP

  # See: mp2p_icp::Parameter
  params:
    maxIterations: ${MOLA_MAX_ICP_ITERATIONS|100}
    minAbsStep_trans: 1e-3
    minAbsStep_rot: 1e-4

    quality_checkpoints:
      - iteration: 80
        minimum_quality: 0.03

    #debugPrintIterationProgress: true  # Print iteration progress
    #generateDebugFiles: true  # Can be override with env var "MP2P_ICP_GENERATE_DEBUG_FILES=1"
    saveIterationDetails: true # Store partial solutions and pairings for each ICP iteration
    decimationIterationDetails: 3
    debugFileNameFormat: "./icp-logs/lc-$UNIQUE_ID-local_$LOCAL_ID$LOCAL_LABEL-to-global_$GLOBAL_ID$GLOBAL_LABEL.icplog"
    decimationDebugFiles: ${MP2P_ICP_LOG_FILES_DECIMATION|1}

  solvers:
    - class: mp2p_icp::Solver_GaussNewton
      params:
        maxIterations: 2
        robustKernel: "${MOLA_LC_ROBUST_KERNEL|RobustKernel::GemanMcClure}"
        robustKernelParam: "${MOLA_LO_ROBUST_KERNEL_PARAM|6.0}" # In GICP, errors are normalized by covariance
        #innerLoopVerbose: true

  # Sequence of one or more pairs (class, params) defining mp2p_icp::Matcher
  # instances to pair geometric entities between pointclouds.
  matchers:
    - class: mp2p_icp::Matcher_Cov2Cov
      params:
        threshold: "max(SIGMA_FINAL, SIGMA_INIT-(SIGMA_INIT-SIGMA_FINAL)*ICP_ITERATION/100)" # [m]
        #threshold: "SIGMA_INIT"
        pairingsPerPoint: 1
        allowMatchAlreadyMatchedGlobalPoints: true # faster
        # Both layers here must be of type 'mola::KeyframePointCloudMap'
        layerMatches:
          - { global: "points_to_register", local: "points_to_register" }

  quality:
    - class: mp2p_icp::QualityEvaluator_PairedRatio
      params:
        absolute_minimum_pairing_ratio: 0.10
        reuse_icp_pairings: true
        #threshold: "2*2.0*SIGMA_FINAL" # [m]
        #thresholdAngularDeg: 0 # deg
        #pairingsPerPoint: 1
        #allowMatchAlreadyMatchedGlobalPoints: true # faster
        #pointLayerMatches:
        #- {
        #global: "points_to_register_points",
        #local: "points_to_register_points",
        #weight: 1.0,
        #}

observations_generator:
  # Generators:
  #
  # One filter object will be created for each entry, instancing the given class,
  # and with the given parameters. Filters are run in definition order on the
  # incoming raw CObservation objects.
  #
  - class_name: mp2p_icp_filters::Generator
    params:
      target_layer: "raw"
      throw_on_unhandled_observation_class: true
      process_class_names_regex: "(mrpt::obs::CObservationPointCloud|mrpt::obs::CObservation2DRangeScan|mrpt::obs::CObservationVelodyneScan)"
      process_sensor_labels_regex: ".*"

  # This just creates an empty layer of the custom class 'mola::KeyframePointCloudMap'
  - class_name: mp2p_icp_filters::Generator
    params:
      target_layer: "points_to_register"
      throw_on_unhandled_observation_class: true
      process_class_names_regex: "" # NONE: don't process observations in the generator.
      #process_sensor_labels_regex: '.*'
      # metric_map_definition_ini_file: '${CURRENT_YAML_FILE_PATH}/localmap_definition_voxelmap.ini'

      metric_map_definition:
        # Any class derived from mrpt::maps::CMetricMap https://docs.mrpt.org/reference/latest/group_mrpt_maps_grp.html
        class: mola::KeyframePointCloudMap
        plugin: "libmola_metric_maps.so" # Import additional custom user-defined map classes (search in LD_LIBRARY_PATH)
        creationOpts: ~ # none required
        insertOpts: ~
        likelihoodOpts: ~ # none required
        renderOpts: ~

observations_filter:
  # Filters:
  #
  # One filter object will be created for each entry, instancing the given class,
  # and with the given parameters. Filters are run in definition order on the
  # input metric_map_t object.
  #
  #- class_name: mp2p_icp_filters::FilterAdjustTimestamps
  #  params:
  #    pointcloud_layer: "raw"
  #    silently_ignore_no_timestamps: false
  #    method: "TimestampAdjustMethod::MiddleIsZero"

  - class_name: mp2p_icp_filters::FilterDeskew
    params:
      input_pointcloud_layer: "raw"
      output_pointcloud_layer: "deskewed"
      method: "${MOLA_DESKEW_METHOD|MotionCompensationMethod::IMU}"
      silently_ignore_no_timestamps: "${MOLA_DESKEW_IGNORE_NO_TIMESTAMPS|false}" # To handle more dataset types
      output_layer_class: "mrpt::maps::CGenericPointsMap" # Keep intensity & ring channels

      # These (vx,...wz) are variable names that must be defined via the
      # mp2p_icp::Parameterizable API to update them dynamically.
      # Only required for the "Linear" deskew method
      #twist: [vx, vy, vz, wx, wy, wz]

      points_already_global: false # In the loop-closure module we first deskew in local, then convert to global coordinates

  # Remove points too close, to prevent "noise" from the vehicle,
  # the person next to the robot, etc. Remove too distant points since
  # the tiniest angular error projects to a large translational error.
  - class_name: mp2p_icp_filters::FilterByRange
    params:
      input_pointcloud_layer: "deskewed"
      output_layer_between: "points_to_register_points"
      range_min: ${MOLA_LC_SENSOR_FILTER_MIN_RANGE|max(1.0, 0.03*ESTIMATED_SENSOR_MAX_RANGE)}
      range_max: ${MOLA_LC_SENSOR_FILTER_MAX_RANGE|1.2*ESTIMATED_SENSOR_MAX_RANGE}

  - class_name: mp2p_icp_filters::FilterMerge
    params:
      input_pointcloud_layer: "points_to_register_points"
      target_layer: "points_to_register"
      input_layer_in_local_coordinates: false

  # Remove layers to save memory and log file storage
  - class_name: mp2p_icp_filters::FilterDeleteLayer
    params:
      pointcloud_layer_to_remove:
        ["raw", "deskewed", "points_to_register_points"]
